# Copy to /etc/nginx/sites-available/agent-harness, then:
#   sudo ln -s /etc/nginx/sites-available/agent-harness /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# After this works over HTTP, get HTTPS free:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d your.domain.com

server {
    listen 80;
    server_name _;   # replace with your domain or VM public IP

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;   # model calls can be slow
    }
}
